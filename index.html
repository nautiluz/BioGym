<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#4285F4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BioGym - Control de Salud</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="screen">
    <div class="login-box">
        <h1><i class="fas fa-heartbeat"></i> BioGym</h1>
        <p>Control de Salud</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="login()">Entrar</button>
        <button class="btn-secondary" onclick="register()">Crear Cuenta</button>
        <p class="admin-link" onclick="document.getElementById('email').value='admin';document.getElementById('password').value='admin123';login()">Admin</p>
    </div>
</div>

<!-- App Screen -->
<div id="app-screen" class="screen" style="display:none;">
    <header>
        <div class="logo">BioGym <span id="sync-status"></span></div>
        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </header>
    
    <div class="status-bar">
        <div class="status-item">
            <span class="status-val" id="water-display">0</span>
            <span class="status-label">Agua L</span>
        </div>
        <div class="status-item">
            <span class="status-val" id="steps-display">0</span>
            <span class="status-label">Pasos</span>
        </div>
        <div class="status-item">
            <span class="status-val" id="sleep-display">0</span>
            <span class="status-label">Sueño h</span>
        </div>
        <div class="status-item">
            <span class="status-val" id="mood-display">-</span>
            <span class="status-label">Ánimo</span>
        </div>
    </div>
    
    <div class="content">
        <h2>Hola, <span id="user-name">Usuario</span></h2>
        
        <div class="card">
            <h3>Registro Rápido</h3>
            <div class="quick-btns">
                <button onclick="addWater()"><i class="fas fa-tint"></i> +0.5L Agua</button>
                <button onclick="addSteps()"><i class="fas fa-walking"></i> +100 Pasos</button>
                <button onclick="addSleep()"><i class="fas fa-bed"></i> +1h Sueño</button>
            </div>
        </div>
        
        <div class="card">
            <h3>Estado de Ánimo</h3>
            <div class="mood-btns">
                <button onclick="setMood('😊')">😊</button>
                <button onclick="setMood('😐')">😐</button>
                <button onclick="setMood('😔')">😔</button>
                <button onclick="setMood('😤')">😤</button>
                <button onclick="setMood('😰')">😰</button>
            </div>
        </div>
        
        <div class="card">
            <h3>Hábitos Diarios</h3>
            <div id="habits-grid" class="habits-grid"></div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <button class="active"><i class="fas fa-home"></i><span>Inicio</span></button>
        <button onclick="alert('Pronto')"><i class="fas fa-calendar"></i><span>Mes</span></button>
        <button onclick="alert('Pronto')"><i class="fas fa-chart-line"></i><span>Stats</span></button>
        <button onclick="alert('Pronto')"><i class="fas fa-user"></i><span>Perfil</span></button>
    </nav>
</div>

<!-- Admin Screen -->
<div id="admin-screen" class="screen" style="display:none;">
    <header>
        <div class="logo">BioGym Admin</div>
        <button onclick="logout()">Salir</button>
    </header>
    <div class="content">
        <h2>Usuarios Registrados</h2>
        <div id="user-list"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
